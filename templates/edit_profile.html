{% extends "base.html" %}

{% block title %} Edit Profile {% endblock%}

{% block content %}

<form method="POST">
    {% csrf_token %}
    {{user.label}}
    <input type="text" value="{{ user.username}}"  name="username" />
    <input type="text" value="{{ user.email}}" name="email"/>
    <button type="submit" class="btn btn-secondary"> Update</button>
</form>


{% endblock %}
