{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content%}
<h2>Reset Password</h2>
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label>Email address</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Send Reset Link</button>
</form>

{% endblock%}
